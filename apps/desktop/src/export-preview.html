<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GCS Export Preview Artifact</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #1b1f27;
        color: #e6ecf5;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }
      .wrap {
        display: grid;
        gap: 12px;
      }
      canvas {
        border: 1px solid #3b4454;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="export-scene-name">Scene: loading</div>
      <canvas id="export-viewport" width="160" height="144"></canvas>
    </div>
    <script type="module" src="./export-preview-runtime.js"></script>
  </body>
</html>
